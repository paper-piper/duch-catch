<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Duck Catch</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/screens.css">
</head>
<body>

  <div id="game-wrapper">

    <div id="start-screen">
      <h1>Duck Catch</h1>
      <p>Help the duck catch the falling bread!</p>
      <ul>
        <li>← → Arrow keys to move</li>
        <li>Catch 10 breads to win</li>
        <li>Don't let bread hit the ground</li>
        <li>You have 60 seconds!</li>
      </ul>
      <button id="start-btn">Start Game</button>
    </div>

    <canvas id="gameCanvas" width="480" height="270"></canvas>

    <div id="game-over-screen" class="hidden">
      <h1>Game Over</h1>
      <p id="end-message"></p>
      <p id="final-score"></p>
      <button id="restart-btn">Play Again</button>
    </div>

  </div>

  <!-- Load order matters: each file only defines, nothing auto-runs.
       main.js at the bottom is the single entry point that kicks everything off. -->

  <script src="js/ui/dom.js"          defer></script>  <!-- DOM refs (ctx, buttons…) -->
  <script src="js/ui/input.js"        defer></script>  <!-- setupInput() -->
  <script src="js/core/config/canvas.js"    defer></script>  <!-- CanvasConfig -->
  <script src="js/core/config/duck.js"      defer></script>  <!-- DuckConfig -->
  <script src="js/core/config/bread.js"     defer></script>  <!-- BreadConfig -->
  <script src="js/core/config/game.js"      defer></script>  <!-- GameConfig -->
  <script src="js/core/config/animation.js" defer></script>  <!-- AnimationConfig -->
  <script src="js/entities/duck.js"   defer></script>  <!-- Duck class — before state.js -->
  <script src="js/entities/bread.js"  defer></script>  <!-- Bread class — before state.js -->
  <script src="js/core/state.js"      defer></script>  <!-- buildState(), difficulty() -->
  <script src="js/render/assets.js"   defer></script>  <!-- loadAssets(), images -->
  <script src="js/render/draw.js"     defer></script>  <!-- draw() -->
  <script src="js/core/loop.js"       defer></script>  <!-- startLoop() -->
  <script src="js/core/update.js"     defer></script>  <!-- update() -->
  <script src="js/core/main.js"       defer></script>  <!-- entry point: main() -->
</body>
</html>
